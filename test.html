<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MindAR Test</title>

  <!-- 用官方推荐版本 -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #debug {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      background: rgba(0,0,0,.7);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 80vw;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="debug">准备中…</div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane color="#FFD84D" width="1" height="0.6" position="0 0 0"></a-plane>
      <a-text
        value="Target Detected"
        align="center"
        color="#000"
        width="2"
        position="0 0 0.01"
      ></a-text>
    </a-entity>
  </a-scene>

  <script>
    const debug = document.getElementById("debug");
    const scene = document.querySelector("a-scene");

    function log(msg) {
      console.log(msg);
      debug.textContent += "\n" + msg;
    }

    window.addEventListener("load", () => {
      debug.textContent = "window loaded";
      log("页面加载完成");
    });

    scene.addEventListener("loaded", () => log("a-scene loaded"));
    scene.addEventListener("renderstart", () => log("renderstart"));
    scene.addEventListener("arReady", () => log("✅ arReady 触发"));
    scene.addEventListener("arError", (e) => {
      log("❌ arError: " + JSON.stringify(e.detail || {}));
    });

    document.addEventListener("visibilitychange", () => {
      log("visibility: " + document.visibilityState);
    });

    navigator.mediaDevices?.getUserMedia?.({ video: true })
      .then((stream) => {
        log("✅ getUserMedia ok");
        stream.getTracks().forEach(track => track.stop());
      })
      .catch((err) => {
        log("❌ getUserMedia failed: " + err.name + " / " + err.message);
      });
  </script>
</body>
</html>
